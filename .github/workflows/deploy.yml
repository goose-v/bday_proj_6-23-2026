name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # change to your default branch

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # CRITICAL: This tells the action to download the actual LFS files
          lfs: true 

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Strip LFS Tracking (Prevents GH Pages from getting the pointers)
        run: |
          git lfs uninstall
          rm -f .gitattributes

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ # Change this if your build site is in a subfolder (like 'dist' or 'public')
          publish_branch: gh-pages